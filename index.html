<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My First Page</title>
  <style>
    body { font-family: system-ui, sans-serif; line-height: 1.5; padding: 2rem; background:#f7f7fb; color:#111; }
    header { margin-bottom:1rem; }
    .card { background:white; padding:1rem; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    button { cursor:pointer; padding:0.4rem 0.6rem; border-radius:6px; border:1px solid #ddd; background:#0070f3; color:white; }
  </style>
</head>
<body>
  <header>
    <h1>My First Page</h1>
    <p>A tiny web page I made as my first commit.</p>
  </header>

  <main class="card">
    <h2>Hello!</h2>
    <p>This is a simple page. Edit this file and make a new commit to practice.</p>
    <button onclick="alert('Congrats on your commit!')">Click me</button>
  </main>

  <footer style="margin-top:1rem; font-size:0.9rem; color:#555;">
    <p>Made by you — put your GitHub username here if you like.</p>
  </footer>
</body>
</html>
